<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
    <h1>Breast Cancer Predictor</h1>
    <p class="subtitle">Enter tumor measurements (all fields required)</p>

    <form id="predictionForm">

        <div class="grid">

            <!-- MEAN -->
            <input type="number" step="0.01" min="0" placeholder="Radius Mean (~10–30)" id="f1" required>
            <input type="number" step="0.01" min="0" placeholder="Texture Mean (~10–40)" id="f2" required>
            <input type="number" step="0.01" min="0" placeholder="Perimeter Mean (~50–200)" id="f3" required>
            <input type="number" step="0.1" min="0" placeholder="Area Mean (~200–2000)" id="f4" required>

            <input type="number" step="0.0001" min="0" max="1" placeholder="Smoothness Mean (0–1)" id="f5" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Compactness Mean (0–1)" id="f6" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Concavity Mean (0–1)" id="f7" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Concave Points Mean (0–1)" id="f8" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Symmetry Mean (0–1)" id="f9" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Fractal Dimension Mean (0–1)" id="f10" required>

            <!-- SE -->
            <input type="number" step="0.01" min="0" placeholder="Radius SE (~0–3)" id="f11" required>
            <input type="number" step="0.01" min="0" placeholder="Texture SE (~0–5)" id="f12" required>
            <input type="number" step="0.01" min="0" placeholder="Perimeter SE (~0–20)" id="f13" required>
            <input type="number" step="0.1" min="0" placeholder="Area SE (~5–200)" id="f14" required>

            <input type="number" step="0.0001" min="0" max="1" placeholder="Smoothness SE (0–1)" id="f15" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Compactness SE (0–1)" id="f16" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Concavity SE (0–1)" id="f17" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Concave Points SE (0–1)" id="f18" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Symmetry SE (0–1)" id="f19" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Fractal Dimension SE (0–1)" id="f20" required>

            <!-- WORST -->
            <input type="number" step="0.01" min="0" placeholder="Radius Worst (~10–40)" id="f21" required>
            <input type="number" step="0.01" min="0" placeholder="Texture Worst (~10–50)" id="f22" required>
            <input type="number" step="0.01" min="0" placeholder="Perimeter Worst (~50–250)" id="f23" required>
            <input type="number" step="0.1" min="0" placeholder="Area Worst (~200–3000)" id="f24" required>

            <input type="number" step="0.0001" min="0" max="1" placeholder="Smoothness Worst (0–1)" id="f25" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Compactness Worst (0–1)" id="f26" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Concavity Worst (0–1)" id="f27" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Concave Points Worst (0–1)" id="f28" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Symmetry Worst (0–1)" id="f29" required>
            <input type="number" step="0.0001" min="0" max="1" placeholder="Fractal Dimension Worst (0–1)" id="f30" required>

        </div>

        <button type="submit">Predict</button>
    </form>

    <h2 id="result"></h2>
</div>

<script src="/static/script.js"></script>
</body>
</html>
